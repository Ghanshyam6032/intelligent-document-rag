<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DocuMind AI | Advanced PDF Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-sidebar: #0a0a0a;
            --sidebar-text: #ececec;
            --sidebar-hover: #1f1f1f;
            --bg-main: #141414;
            --bg-input: #1f1f1f;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2d2d2d;
            --accent: #10b981; 
            --accent-hover: #059669;
            --user-bubble: linear-gradient(135deg, #3b82f6, #6366f1);
            --bot-bubble: #262626;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* BROWSER FIX: Cleaned up mobile foundation */
        body, html { 
            height: 100%; 
            width: 100%; 
            margin: 0;
            padding: 0;
            background-color: var(--bg-main); 
            color: var(--text-main); 
            overflow: hidden; 
            overscroll-behavior-y: none; /* Prevents pull-to-refresh rubber-banding */
            -webkit-text-size-adjust: 100%;
        }
        
        /* BROWSER FIX: Absolute positioning anchors it correctly when keyboard opens */
        .layout { 
            display: flex; 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            left: 0; 
            right: 0;
            width: 100%; 
        }
        
        .sidebar {
            width: 280px; background-color: var(--bg-sidebar); color: var(--sidebar-text);
            display: flex; flex-direction: column; padding: 1rem;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
            border-right: 1px solid var(--border-color);
        }

        .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.1rem; margin-bottom: 25px; padding: 0 5px; }

        .new-chat-btn {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 15px;
            background-color: var(--sidebar-hover); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500; transition: all 0.2s; margin-bottom: 20px;
        }
        .new-chat-btn:hover { border-color: #4b5563; background-color: #2a2a2a; }

        .active-file-box {
            display: none; padding: 15px; background-color: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px;
            font-size: 13px; margin-bottom: 15px; border-left: 3px solid var(--accent);
        }
        .active-file-box p { color: var(--text-muted); font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;}
        .active-file-box .filename { font-weight: 500; color: var(--text-main); word-break: break-all; }

        .sidebar-bottom { margin-top: auto; padding: 15px 5px; border-top: 1px solid var(--border-color); font-size: 13px; }
        .status-pill { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-weight: 500; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot.active { background-color: var(--success); box-shadow: 0 0 8px var(--success); }

        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }

        .drag-overlay {
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(16, 185, 129, 0.05); border: 2px dashed var(--accent); z-index: 200;
            align-items: center; justify-content: center; font-size: 1.5rem; color: var(--accent); font-weight: 500; backdrop-filter: blur(2px);
        }
        .main-area.drag-active .drag-overlay { display: flex; }

        .mobile-header {
            display: none; padding: 10px 14px; border-bottom: 1px solid var(--border-color);
            align-items: center; gap: 12px; font-weight: 600; background-color: var(--bg-main);
            flex-shrink: 0; z-index: 10;
        }
        .hamburger { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; }

        .chat-container { flex: 1; overflow-y: auto; padding: 16px 12px; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }

        .welcome-screen { margin: auto; text-align: center; color: var(--text-muted); max-width: 450px; padding: 20px; }
        .welcome-screen svg { margin-bottom: 15px; color: var(--text-muted); opacity: 0.5; }
        .welcome-screen h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text-main); font-weight: 600; }
        .welcome-screen p { line-height: 1.5; font-size: 13px; }

        .message-row { display: flex; width: 100%; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .message-row.user { justify-content: flex-end; }
        .message-row.bot { justify-content: flex-start; }

        .message-wrapper { display: flex; max-width: 88%; gap: 10px; }
        .message-row.user .message-wrapper { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid var(--bg-main);
        }
        .avatar.bot { background-color: var(--accent); color: white; }
        .avatar.user { background: var(--user-bubble); color: white; }

        .bubble {
            padding: 12px 16px; border-radius: 16px; position: relative; font-size: 14px; line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); word-break: break-word;
        }
        .message-row.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .message-row.bot .bubble { background-color: var(--bot-bubble); color: var(--text-main); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }

        .meta-info { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; font-size: 10px; color: rgba(255,255,255,0.5); }
        .message-row.bot .meta-info { color: var(--text-muted); }

        .bubble.bot p { margin-bottom: 8px; }
        .bubble.bot p:last-child { margin-bottom: 0; }
        .bubble.bot strong { color: #fff; font-weight: 600; }
        .bubble.bot ul, .bubble.bot ol { margin-left: 16px; margin-bottom: 8px; }
        .bubble.bot li { margin-bottom: 4px; }
        .bubble.bot pre { background-color: #1a1a1a; padding: 10px; border-radius: 6px; overflow-x: auto; margin-bottom: 8px; border: 1px solid #333; }
        .bubble.bot code { font-family: monospace; font-size: 12px; }
        .bubble.bot p code { background-color: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; }
        .bubble.bot table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
        .bubble.bot th, .bubble.bot td { border: 1px solid #444; padding: 6px; text-align: left; }
        .bubble.bot th { background-color: #333; }

        .copy-btn { background: none; border: none; color: inherit; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 10px; opacity: 0.7; }
        .copy-btn:hover { opacity: 1; }

        .input-area { 
            padding: 10px 12px; 
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex; flex-direction: column; align-items: center; 
            background: var(--bg-main); 
            flex-shrink: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 10;
        }

        .input-box {
            width: 100%; max-width: 800px; background-color: var(--bg-input); border: 1px solid var(--border-color); 
            border-radius: 24px;
            display: flex; align-items: center; 
            padding: 4px 6px; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .input-box:focus-within { border-color: #555; }

        .attach-btn { background: none; border: none; color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .attach-btn:hover { background-color: rgba(255,255,255,0.08); color: var(--text-main); }
        
        .mini-spinner { width: 18px; height: 18px; border: 2px solid var(--text-muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .input-box input[type="text"] { 
            flex: 1; background: transparent; border: none; padding: 0 10px; 
            color: var(--text-main); font-size: 16px; /* 16px prevents iOS zoom */
            height: 40px; line-height: 40px;
            outline: none; 
        }
        .input-box input[type="text"]::placeholder { color: #6b7280; }

        .send-btn { background-color: white; color: black; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 4px; flex-shrink: 0; }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); }
        .send-btn:disabled { background-color: #333; color: #555; cursor: not-allowed; }

        .footer-text { font-size: 9px; color: #6b7280; margin-top: 6px; text-align: center; font-weight: 500; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .toast-container { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        .toast { background-color: #262626; color: #fff; padding: 12px 18px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-left: 4px solid var(--accent); margin-bottom: 10px; font-size: 13px; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 500; display: flex; align-items: center; gap: 8px;}
        .toast.error { border-color: var(--danger); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; height: 100dvh; }
            .sidebar.active { left: 0; box-shadow: 10px 0 25px rgba(0,0,0,0.6); }
            .mobile-header { display: flex; }
            .message-wrapper { max-width: 92%; }
        }
    </style>
</head>
<body>

    <div class="layout" id="appLayout">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                DocuMind AI
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Session
            </button>

            <div class="active-file-box" id="activeFileBox">
                <p>Current Document</p>
                <div class="filename" id="activeFileName">document.pdf</div>
            </div>

            <input type="file" id="fileInput" accept=".pdf" hidden>

            <div class="sidebar-bottom">
                <div class="status-pill">
                    <div class="dot" id="dbStatusDot"></div>
                    <span id="dbStatusText">Vector DB Empty</span>
                </div>
            </div>
        </aside>

        <main class="main-area" id="mainArea">
            <div class="drag-overlay">Release to securely upload PDF</div>
            
            <div class="mobile-header">
                <button class="hamburger" id="menuBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <span>DocuMind AI</span>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    <h1>Analyze any Document</h1>
                    <p>Drag and drop a PDF file anywhere, or click the paperclip icon below to begin.</p>
                </div>
            </div>

            <div class="input-area" id="inputArea">
                <div class="input-box">
                    <button class="attach-btn" id="attachBtn" title="Upload PDF">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <input type="text" id="chatInput" placeholder="Ask a question about the document..." required autocomplete="off">
                    <button id="sendBtn" class="send-btn" disabled>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <div class="footer-text">Responses are generated based strictly on your uploaded document context.</div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = "https://intelligent-document-rag-production.up.railway.app";

        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const mainArea = document.getElementById('mainArea');
        const dbStatusDot = document.getElementById('dbStatusDot');
        const dbStatusText = document.getElementById('dbStatusText');
        const activeFileBox = document.getElementById('activeFileBox');
        const activeFileName = document.getElementById('activeFileName');
        
        const attachIconSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>`;
        const spinnerHtml = `<div class="mini-spinner"></div>`;

        marked.setOptions({
            breaks: true, gfm: true,
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        function getCurrentTime() {
            return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        chatInput.addEventListener('input', function() {
            sendBtn.disabled = this.value.trim() === '';
        });

        document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('sidebar').classList.add('active'));
        mainArea.addEventListener('click', (e) => {
            if(window.innerWidth <= 768 && !e.target.closest('.mobile-header')) {
                document.getElementById('sidebar').classList.remove('active');
            }
        });

        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/`);
                const data = await res.json();
                if (data.vector_db_loaded) setDBStatus(true);
            } catch (err) { console.error("Health check failed"); }
        }
        checkHealth();

        function setDBStatus(ready) {
            if(ready) {
                dbStatusDot.classList.add('active'); dbStatusText.textContent = 'Engine Ready';
            } else {
                dbStatusDot.classList.remove('active'); dbStatusText.textContent = 'Awaiting Document';
            }
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) uploadFile(e.target.files[0]);
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => mainArea.addEventListener(e, ev => ev.preventDefault()));
        mainArea.addEventListener('dragenter', () => mainArea.classList.add('drag-active'));
        mainArea.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null || !mainArea.contains(e.relatedTarget)) mainArea.classList.remove('drag-active');
        });
        mainArea.addEventListener('drop', (e) => {
            mainArea.classList.remove('drag-active');
            if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
        });

        async function uploadFile(file) {
            if (file.type !== 'application/pdf') return showToast('Please upload a valid PDF file.', 'error');
            
            const formData = new FormData();
            formData.append('file', file);
            
            attachBtn.innerHTML = spinnerHtml; attachBtn.disabled = true;
            chatInput.placeholder = "Indexing PDF..."; chatInput.disabled = true;
            
            try {
                const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if(res.ok) {
                    showToast('PDF successfully analyzed!');
                    setDBStatus(true);
                    activeFileName.textContent = file.name; activeFileBox.style.display = 'block';
                    if(document.querySelector('.welcome-screen')) chatContainer.innerHTML = '';
                    addMessage('bot', `I've successfully processed **${file.name}**. I'm ready to answer any questions based on this document.`);
                } else throw new Error(data.detail);
            } catch (err) {
                showToast(err.message || 'Error processing document.', 'error');
            } finally {
                attachBtn.innerHTML = attachIconSvg; attachBtn.disabled = false;
                chatInput.placeholder = "Ask a question about the document..."; chatInput.disabled = false;
                fileInput.value = ''; 
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') { 
                e.preventDefault(); 
                if(!sendBtn.disabled) sendMessage(); 
            }
        });

        async function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;

            if(document.querySelector('.welcome-screen')) chatContainer.innerHTML = '';
            
            addMessage('user', text);
            chatInput.value = ''; sendBtn.disabled = true;

            const typingId = addTyping();

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                const data = await res.json();
                document.getElementById(typingId).remove();
                
                if(res.ok) addMessage('bot', data.answer);
                else throw new Error(data.detail);
            } catch (err) {
                document.getElementById(typingId).remove();
                addMessage('bot', 'Error connecting to the AI engine: ' + err.message);
            } finally {
                sendBtn.disabled = false; 
            }
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message-row ${sender}`;
            
            const timeStr = getCurrentTime();
            const formatted = sender === 'bot' ? marked.parse(text) : text.replace(/\n/g, '<br>');
            
            const icon = sender === 'bot' 
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"></path><rect x="6" y="8" width="12" height="10" rx="2"></rect></svg>' 
                : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>';

            const copyHtml = sender === 'bot' ? `
                <button class="copy-btn" onclick="copyText(this, \`${text.replace(/"/g, '&quot;').replace(/`/g, '\\`')}\`)">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy
                </button>
            ` : '';

            div.innerHTML = `
                <div class="message-wrapper">
                    <div class="avatar ${sender}">${icon}</div>
                    <div class="bubble ${sender}">
                        <div class="message-text">${formatted}</div>
                        <div class="meta-info">
                            <span>${timeStr}</span>
                            ${copyHtml}
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            
            div.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });
            setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 50);
        }

        function addTyping() {
            const id = 'type-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message-row bot';
            div.id = id;
            div.innerHTML = `
                <div class="message-wrapper">
                    <div class="avatar bot"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"></path><rect x="6" y="8" width="12" height="10" rx="2"></rect></svg></div>
                    <div class="bubble bot" style="display:flex; align-items:center; height: 38px;">
                        <span class="blink">● ● ●</span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        window.copyText = function(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
                btn.style.color = "#10b981";
                setTimeout(() => { btn.innerHTML = originalHtml; btn.style.color = "inherit"; }, 2000);
            });
        }

        document.getElementById('newChatBtn').addEventListener('click', () => {
            chatContainer.innerHTML = `
                <div class="welcome-screen">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    <h1>Analyze any Document</h1>
                    <p>Drag and drop a PDF file anywhere, or click the paperclip icon below to begin.</p>
                </div>
            `;
        });

        function showToast(msg, type='success') {
            const box = document.createElement('div');
            box.className = `toast ${type}`;
            
            const icon = type === 'success' 
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
                
            box.innerHTML = `${icon} <span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(box);
            setTimeout(() => {
                box.style.animation = 'slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) reverse forwards';
                setTimeout(() => box.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
