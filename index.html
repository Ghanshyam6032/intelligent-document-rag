<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-black: #030305;
            --surface-dark: rgba(15, 15, 20, 0.6);
            --surface-light: rgba(255, 255, 255, 0.03);
            
            --glow-primary: #8b5cf6;
            --glow-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-dim: #8b949e;
            
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
            
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* --- MOBILE ZOOM FIX (ONLY FOR PHONES) --- */
        @media (max-width: 768px) {
            input, textarea, button, select {
                font-size: 16px !important;
                touch-action: manipulation;
            }
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--space-black);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- CINEMATIC BACKGROUND GLOWS --- */
        .ambient-light-1 {
            position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%; filter: blur(60px); z-index: 0; animation: pulseGlow 8s infinite alternate;
        }
        .ambient-light-2 {
            position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px); z-index: 0; animation: pulseGlow 10s infinite alternate-reverse;
        }

        @keyframes pulseGlow { 0% { opacity: 0.5; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        @keyframes floatUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px; height: 100%;
            background: linear-gradient(180deg, rgba(10,10,15,0.8) 0%, rgba(5,5,8,0.95) 100%);
            backdrop-filter: var(--glass-blur); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 50; flex-shrink: 0;
            position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); transition: var(--transition-smooth);
        }
        .sidebar.open { transform: translateX(0); }
        
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 40; opacity: 0; pointer-events: none; transition: var(--transition-smooth);
        }
        .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

        .brand { padding: 24px; font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #fff, #8b949e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }

        .sidebar-content { padding: 0 24px; flex: 1; }
        
        .new-chat-btn {
            width: 100%; padding: 16px; border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02); color: #fff; font-weight: 500; font-family: inherit;
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: var(--transition-smooth);
            box-shadow: inset 0 0 0 0 var(--glow-primary); margin-bottom: 32px;
        }
        .new-chat-btn:hover { border-color: var(--glow-primary); background: rgba(139, 92, 246, 0.1); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }

        .doc-status {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 16px; position: relative; overflow: hidden;
        }
        .doc-status::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #4b5563; transition: var(--transition-smooth); }
        .doc-status.ready::before { background: linear-gradient(to bottom, var(--glow-primary), var(--glow-secondary)); box-shadow: 0 0 15px var(--glow-primary); }
        
        .doc-title { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        #doc-name { font-size: 1rem; font-weight: 500; word-break: break-all; }

        /* --- MAIN INTERFACE --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100%; min-width: 0; }

        .top-nav {
            padding: 16px 24px; display: flex; align-items: center; gap: 16px;
            background: transparent; z-index: 20;
        }
        .menu-btn { background: transparent; border: none; color: var(--text-main); cursor: pointer; display: flex; padding: 8px; border-radius: 8px; }
        .menu-btn:hover { background: var(--surface-light); }

        /* --- CHAT DISPLAY --- */
        .chat-area { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 32px; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message { display: flex; gap: 20px; animation: floatUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; max-width: 75%; }

        .avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 600; font-size: 1.1rem; }
        .message.ai .avatar { background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary)); color: #fff; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .message.user .avatar { background: var(--surface-light); border: 1px solid var(--glass-border); }

        .bubble { padding: 18px 24px; border-radius: var(--radius-xl); font-size: 1.05rem; line-height: 1.6; letter-spacing: 0.3px; position: relative; }
        
        .message.ai .bubble {
            background: rgba(15, 15, 20, 0.7); backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top-left-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .message.user .bubble {
            background: linear-gradient(to right, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255, 255, 255, 0.1); border-top-right-radius: 4px;
        }

        .markdown p { margin-bottom: 12px; }
        .markdown p:last-child { margin-bottom: 0; }
        .markdown code { font-family: 'Space Mono', monospace; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; color: var(--glow-secondary); font-size: 0.9em; }

        .typing { display: flex; gap: 6px; padding: 10px 0; }
        .typing span { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: typeBlink 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typeBlink { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); background: var(--glow-primary); } }

        /* --- FLOATING INPUT CONSOLE --- */
        .input-zone { padding: 20px 24px 32px; background: linear-gradient(to top, var(--space-black) 70%, transparent); position: relative; z-index: 20; }
        
        .input-console {
            max-width: 850px; margin: 0 auto; display: flex; align-items: flex-end; gap: 12px;
            background: rgba(20, 20, 25, 0.6); backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-xl);
            padding: 12px 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: var(--transition-smooth);
        }
        .input-console:focus-within { border-color: rgba(139, 92, 246, 0.5); box-shadow: 0 0 30px rgba(139, 92, 246, 0.15), 0 20px 40px rgba(0,0,0,0.8); }
        .input-console.disabled { opacity: 0.5; pointer-events: none; }

        .tool-btn {
            width: 44px; height: 44px; border-radius: 50%; background: transparent; border: none; color: var(--text-dim);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-smooth); flex-shrink: 0;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        
        textarea {
            flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1.05rem;
            line-height: 1.5; resize: none; max-height: 150px; min-height: 24px; padding: 10px 0; font-family: inherit;
        }
        textarea:focus { outline: none; }
        textarea::placeholder { color: #4b5563; }

        .send-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none; flex-shrink: 0; cursor: pointer;
            background: linear-gradient(135deg, var(--glow-primary), var(--glow-secondary)); color: #fff;
            display: flex; align-items: center; justify-content: center; transition: var(--transition-smooth);
        }
        .send-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 15px var(--glow-primary); }

        /* Toast */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(20,20,25,0.9); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 14px 20px; border-radius: var(--radius-md); font-size: 0.9rem; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: toastIn 0.3s forwards; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (min-width: 768px) {
            .sidebar { position: static; transform: none; }
            .sidebar-overlay { display: none; }
            .menu-btn { display: none; }
            .message { max-width: 75%; }
            .message.user { max-width: 60%; }
        }
    </style>
</head>
<body>

    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand">PDF Assistant</div>
        
        <div class="sidebar-content">
            <button class="new-chat-btn" onclick="startNewChat()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> 
                Initialize Session
            </button>
            
            <div class="doc-status" id="doc-card">
                <div class="doc-title">Active Database</div>
                <div id="doc-name" style="color: #4b5563;">Awaiting Document Upload...</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <button class="menu-btn" id="toggle-sidebar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </header>

        <div class="chat-area" id="chat-area">
            <div class="message ai">
                <div class="avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div class="bubble markdown">
                    <p>System Online. Upload a PDF blueprint or document to begin structural analysis.</p>
                </div>
            </div>
        </div>

        <div class="input-zone">
            <input type="file" id="file-upload" accept=".pdf" style="display: none;">
            
            <div class="input-console" id="main-input-box">
                <button class="tool-btn" id="attach-btn" title="Upload Document">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                
                <textarea id="chat-input" rows="1" placeholder="Awaiting document..." disabled></textarea>
                
                <button class="send-btn" id="send-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 2px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://intelligent-document-rag-production.up.railway.app";
        
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatArea = document.getElementById('chat-area');
        const fileUpload = document.getElementById('file-upload');
        const attachBtn = document.getElementById('attach-btn');
        const inputBox = document.getElementById('main-input-box');
        const docName = document.getElementById('doc-name');
        const docCard = document.getElementById('doc-card');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        
        let isWaiting = false;
        let isDocUploaded = false;

        document.getElementById('toggle-sidebar').addEventListener('click', () => {
            sidebar.classList.add('open'); overlay.classList.add('show');
        });
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open'); overlay.classList.remove('show');
        });

        attachBtn.addEventListener('click', () => fileUpload.click());

        fileUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type !== "application/pdf") return showToast("Invalid format. PDF required.", "error");

            const formData = new FormData(); formData.append('file', file);

            showToast('Extracting data...', 'info');
            docName.textContent = "Processing: " + file.name;
            docCard.classList.remove('ready'); inputBox.classList.add('disabled');

            try {
                const response = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || "Processing failed");

                isDocUploaded = true;
                docName.textContent = file.name;
                docName.style.color = "#fff";
                docCard.classList.add('ready');
                
                inputBox.classList.remove('disabled');
                chatInput.disabled = false;
                chatInput.placeholder = "Enter query...";
                if(window.innerWidth > 768) chatInput.focus();
                
                showToast('Document Integration Complete', 'success');
                appendMessage(`Database updated with **${file.name}**. Ready for queries.`, 'ai');
            } catch (error) {
                showToast(error.message, 'error');
                docName.textContent = "Integration Failed"; docName.style.color = "#ef4444";
                inputBox.classList.remove('disabled');
            } finally { fileUpload.value = ''; }
        });

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim() === "") this.style.height = 'auto';
            sendBtn.disabled = this.value.trim() === "" || isWaiting || !isDocUploaded;
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) handleSend(); }
        });

        sendBtn.addEventListener('click', handleSend);

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text || isWaiting || !isDocUploaded) return;

            chatInput.value = ''; chatInput.style.height = 'auto'; sendBtn.disabled = true;
            appendMessage(text, 'user');
            
            isWaiting = true; inputBox.classList.add('disabled');
            const loaderId = appendLoading();

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });

                if (!response.ok) throw new Error("Server malfunction");
                const data = await response.json();
                
                document.getElementById(loaderId).remove();
                appendMessage(data.answer, 'ai');
            } catch (error) {
                document.getElementById(loaderId).remove();
                showToast(error.message, 'error');
                appendMessage(`**Error:** ${error.message}`, 'ai');
            } finally {
                isWaiting = false; inputBox.classList.remove('disabled');
                if(window.innerWidth > 768) chatInput.focus();
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const isAI = sender === 'ai';
            const icon = isAI 
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' 
                : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>';
            
            let content = isAI ? parseMarkdown(text) : escapeHtml(text).replace(/\n/g, '<br>');
            
            div.innerHTML = `<div class="avatar">${icon}</div><div class="bubble ${isAI?'markdown':''}">${content}</div>`;
            chatArea.appendChild(div);
            setTimeout(() => chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }), 50);
        }

        function appendLoading() {
            const id = 'l-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message ai'; div.id = id;
            div.innerHTML = `<div class="avatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                             <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
            chatArea.appendChild(div);
            setTimeout(() => chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }), 50);
            return id;
        }

        window.startNewChat = () => {
            if(!isDocUploaded) return showToast("No active document.", "info");
            chatArea.innerHTML = '';
            appendMessage(`Session re-initialized for **${docName.textContent}**.`, 'ai');
            if (window.innerWidth <= 768) { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
        };

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = 'toast';
            toast.innerHTML = `<span>${escapeHtml(msg)}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function parseMarkdown(text) {
            let p = escapeHtml(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/`([^`]+)`/g, '<code>$1</code>');
            return p.split('\n\n').filter(x=>x.trim()!='').map(x => `<p>${x.replace(/\n/g, '<br>')}</p>`).join('');
        }
    </script>
</body>
</html>
